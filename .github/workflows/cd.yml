name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_REGISTRY }}/chatbot-platform/backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_REGISTRY }}/chatbot-platform/frontend
  K8S_NAMESPACE: chatbot-platform
  K8S_CLUSTER_NAME: ${{ secrets.K8S_CLUSTER_NAME }}

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
          fi

      - name: Generate semantic version
        id: semver
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=${GITHUB_SHA::8}
            TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
            echo "version=v${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    name: Build & Push Images
    needs: [version]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ needs.version.outputs.environment }}
    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short
          flavor: |
            latest=true

      - name: Generate Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short
          flavor: |
            latest=true

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Run Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          image: ${{ env.BACKEND_IMAGE }}:latest
          only-severities: critical,high
          exit-code: false

  deploy-staging:
    name: Deploy to Staging
    needs: [version, build-and-push]
    runs-on: ubuntu-latest
    if: needs.version.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.chatbot.example.com
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.K8S_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Update Kubernetes manifests
        run: |
          cd kubernetes
          kustomize edit set image chatbot-platform/backend=${{ env.BACKEND_IMAGE }}:${{ needs.version.outputs.version }}
          kustomize edit set image chatbot-platform/frontend=${{ env.FRONTEND_IMAGE }}:${{ needs.version.outputs.version }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k kubernetes/ --namespace ${{ env.K8S_NAMESPACE }}

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/backend --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/frontend --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/worker --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Run post-deployment smoke tests
        env:
          API_URL: https://staging-api.chatbot.example.com
          FRONTEND_URL: https://staging.chatbot.example.com
        run: |
          curl -sf $API_URL/api/v1/health -o /dev/null && echo "Backend health check passed"
          curl -sf $FRONTEND_URL -o /dev/null && echo "Frontend health check passed"

  deploy-production:
    name: Deploy to Production
    needs: [version, build-and-push]
    runs-on: ubuntu-latest
    if: needs.version.outputs.environment == 'production'
    environment:
      name: production
      url: https://chatbot.example.com
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.K8S_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Update Kubernetes manifests
        run: |
          cd kubernetes
          kustomize edit set image chatbot-platform/backend=${{ env.BACKEND_IMAGE }}:${{ needs.version.outputs.version }}
          kustomize edit set image chatbot-platform/frontend=${{ env.FRONTEND_IMAGE }}:${{ needs.version.outputs.version }}

      - name: Create canary deployment
        run: |
          kubectl apply -f kubernetes/canary/ --namespace ${{ env.K8S_NAMESPACE }} || echo "No canary manifest"

      - name: Deploy to production (rolling update)
        run: |
          kubectl apply -k kubernetes/ --namespace ${{ env.K8S_NAMESPACE }}

      - name: Monitor rollout
        run: |
          kubectl rollout status deployment/backend --namespace ${{ env.K8S_NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/frontend --namespace ${{ env.K8S_NAMESPACE }} --timeout=600s
          kubectl rollout status deployment/worker --namespace ${{ env.K8S_NAMESPACE }} --timeout=600s

      - name: Health check
        env:
          API_URL: https://api.chatbot.example.com
          FRONTEND_URL: https://chatbot.example.com
        run: |
          echo "Checking backend health..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $API_URL/api/v1/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check passed"
              break
            fi
            echo "Attempt $i: backend returned $STATUS, waiting..."
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check failed after all retries"
            kubectl get pods -n ${{ env.K8S_NAMESPACE }}
            exit 1
          fi
          curl -sf $FRONTEND_URL -o /dev/null && echo "Frontend health check passed"

      - name: Run E2E tests
        uses: cypress-io/github-action@v6
        if: false
        with:
          config: baseUrl=${{ env.FRONTEND_URL }}
        env:
          CYPRESS_BASE_URL: https://chatbot.example.com

  rollback:
    name: Rollback
    needs: [deploy-production, deploy-staging]
    runs-on: ubuntu-latest
    if: failure()
    environment: ${{ needs.version.outputs.environment }}
    steps:
      - name: Rollback backend
        run: |
          kubectl rollout undo deployment/backend --namespace ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/backend --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Rollback frontend
        run: |
          kubectl rollout undo deployment/frontend --namespace ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/frontend --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Rollback worker
        run: |
          kubectl rollout undo deployment/worker --namespace ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/worker --namespace ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: ${{ secrets.SLACK_DEPLOY_CHANNEL }}
          slack-message: ":alert: Deployment rolled back - ${{ github.repository }}@${{ github.sha }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  notify:
    name: Notify Deployment Status
    needs: [deploy-production, deploy-staging]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: ${{ secrets.SLACK_DEPLOY_CHANNEL }}
          payload: |
            {
              "text": ":rocket: Deployment to ${{ needs.version.outputs.environment }} succeeded!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rocket: *Deployment Successful*\n*Environment:* ${{ needs.version.outputs.environment }}\n*Version:* ${{ needs.version.outputs.version }}\n*Repository:* ${{ github.repository }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: ${{ secrets.SLACK_DEPLOY_CHANNEL }}
          payload: |
            {
              "text": ":alert: Deployment to ${{ needs.version.outputs.environment }} failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":alert: *Deployment Failed*\n*Environment:* ${{ needs.version.outputs.environment }}\n*Version:* ${{ needs.version.outputs.version }}\n*Repository:* ${{ github.repository }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
