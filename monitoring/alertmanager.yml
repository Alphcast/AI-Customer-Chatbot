route:
  group_by: ['alertname', 'severity', 'namespace', 'pod']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-critical'
  routes:
    - receiver: 'slack-critical'
      match:
        severity: critical
      repeat_interval: 1h
      group_wait: 10s

    - receiver: 'slack-warning'
      match:
        severity: warning
      repeat_interval: 4h

    - receiver: 'pagerduty-critical'
      match:
        severity: critical
        pagerduty: "true"
      repeat_interval: 5m

    - receiver: 'email-info'
      match:
        severity: info
      repeat_interval: 24h

receivers:
  - name: 'slack-critical'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGE_ME'
        channel: '#alerts-critical'
        send_resolved: true
        title: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
        text: |-
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .GroupLabels.severity }}
          *Namespace:* {{ .GroupLabels.namespace }}
          *Pod:* {{ .GroupLabels.pod }}
          *Description:* {{ index .Alerts 0 ".Annotations.description" }}
          *Summary:* {{ index .Alerts 0 ".Annotations.summary" }}
          *Graph:* <{{ index .Alerts 0 ".GeneratorURL" }}|View in Prometheus>
          {{ range .Alerts }}
            *Labels:* {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
          {{ end }}

  - name: 'slack-warning'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGE_ME'
        channel: '#alerts-warning'
        send_resolved: true
        title: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
        text: |-
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .GroupLabels.severity }}
          *Description:* {{ index .Alerts 0 ".Annotations.description" }}

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: 'CHANGE_ME'
        severity: critical
        send_resolved: true
        description: '{{ .GroupLabels.alertname }} - {{ index .Alerts 0 ".Annotations.summary" }}'
        client: 'AI Chatbot Monitoring'
        client_url: 'https://monitoring.chatbot.example.com'
        details:
          namespace: '{{ .GroupLabels.namespace }}'
          pod: '{{ .GroupLabels.pod }}'
          alert: '{{ .GroupLabels.alertname }}'

  - name: 'email-info'
    email_configs:
      - to: 'devops@chatbot.example.com'
        send_resolved: true
        from: 'alertmanager@chatbot.example.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alertmanager@chatbot.example.com'
        auth_password: 'CHANGE_ME'
        headers:
          subject: '[INFO] {{ .GroupLabels.alertname }} - {{ .GroupLabels.severity }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'namespace', 'pod']

  - source_match:
      severity: critical
    target_match:
      severity: info
    equal: ['alertname', 'namespace']
