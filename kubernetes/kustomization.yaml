apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: chatbot-platform

namePrefix: chatbot-
nameSuffix: ""

commonLabels:
  app.kubernetes.io/name: ai-chatbot
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: customer-support-platform

commonAnnotations:
  app.kubernetes.io/version: "1.0.0"
  environment: production
  managed-by: "kustomize"

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml
  - redis.yaml
  - backend.yaml
  - worker.yaml
  - frontend.yaml
  - hpa.yaml
  - ingress.yaml

images:
  - name: chatbot-platform/backend
    newName: your-registry/chatbot-platform/backend
    newTag: latest
  - name: chatbot-platform/frontend
    newName: your-registry/chatbot-platform/frontend
    newTag: latest

configMapGenerator:
  - name: chatbot-config
    behavior: merge
    literals:
      - NODE_ENV=production

secretGenerator:
  - name: chatbot-secrets
    behavior: merge
    type: Opaque

patchesStrategicMerge: []

replicas:
  - name: backend
    count: 3
  - name: frontend
    count: 3
  - name: worker
    count: 2
