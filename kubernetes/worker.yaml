apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: chatbot-platform
  labels:
    app: worker
    app.kubernetes.io/name: ai-chatbot
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: customer-support-platform
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        app.kubernetes.io/name: ai-chatbot
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - worker
                topologyKey: kubernetes.io/hostname
      containers:
        - name: worker
          image: chatbot-platform/backend:latest
          imagePullPolicy: Always
          command:
            - node
            - dist/src/workers/main.js
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: chatbot-config
                  key: NODE_ENV
            - name: DATABASE_URL
              value: "postgresql://chatbot:$(DB_PASSWORD)@postgres:5432/chatbot"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: JWT_SECRET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: ANTHROPIC_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: GEMINI_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: chatbot-config
                  key: AWS_REGION
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: AWS_S3_BUCKET
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: PINECONE_API_KEY
            - name: PINECONE_ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: PINECONE_ENVIRONMENT
            - name: PINECONE_INDEX
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: PINECONE_INDEX
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatbot-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "process.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "process.exit(0)"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker-sa
  namespace: chatbot-platform
  labels:
    app.kubernetes.io/name: ai-chatbot
    app.kubernetes.io/component: worker
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-pdb
  namespace: chatbot-platform
  labels:
    app: worker
    app.kubernetes.io/name: ai-chatbot
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: worker
